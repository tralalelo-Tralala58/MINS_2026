syntax = "proto3";

package pharmacy.core;

option java_package = "pharmacy.proto";
option java_multiple_files = true;

service CoreService {
  // Reference вызывает этот метод при старте, чтобы получить все лекарства
  rpc GetAllMedicines (EmptyRequest) returns (GetAllMedicinesResponse);
  // Для синх при добавлении (уведомление Reference)
  //rpc NotifyMedicineAdded (MedicineAddedNotification) returns (EmptyResponse);
  // Для синх при удалении
  //rpc NotifyMedicineRemoved (MedicineRemovedNotification) returns (EmptyResponse);
}

message EmptyRequest {}

message EmptyResponse {}

message MedicineAddedNotification {
  string id = 1;
  string name = 2;
  bool requires_prescription = 3;
  string trace_id = 4;
}

message MedicineRemovedNotification {
  string id = 1;
  string trace_id = 2;
}

message MedicineInfo {
  string id = 1;
  string name = 2;
  bool requires_prescription = 3;
}

message GetAllMedicinesResponse {
  repeated MedicineInfo medicines = 1;
}